<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GRÁFICA: EL HOYO NEGRO DE LA SEC | MS</title>
    <!-- BLINDAJE DE SIGILO: METADATOS DE CAMUFLAJE -->
    <meta property="og:title" content="DIAGNÓSTICO FINANCIERO: TRANSPARENCIA PRESUPUESTARIA SONORA">
    <meta property="og:description" content="Análisis gráfico de dispersión de fondos federales y locales. Reporte técnico confidencial.">
    <meta property="og:image" content="../media/ms_logo_header.png">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #ff3e3e; --bg: #050505; --c: #0e0e0e; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Roboto Mono', monospace; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--c); padding: 40px; border: 1px solid #333; box-shadow: 0 0 30px rgba(255, 62, 62, 0.1); }
        h1 { color: var(--p); text-align: center; font-size: 1.4rem; border-bottom: 1px solid var(--p); padding-bottom: 10px; }
        .data-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { padding: 20px; border: 1px solid #222; background: #000; text-align: center; }
        .card span { display: block; font-size: 0.8rem; color: #888; }
        .card b { font-size: 1.5rem; color: var(--p); }
        .hoyo-negro { border: 2px dashed var(--p); padding: 20px; margin-top: 20px; text-align: center; color: var(--p); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VISUALIZACIÓN: EL DESFALCO QUINQUENAL</h1>
        <p style="text-align: center; font-size: 0.8rem; opacity: 0.6;">DIFERENCIA ENTRE MONTO PRESUPUESTADO VS MONTO DISPERSADO (POR TRABAJADOR)</p>
        
        <div style="height: 400px; margin-top: 20px;">
            <canvas id="auditChart"></canvas>
        </div>

        <div class="data-summary">
            <div class="card">
                <span>PAGO DEBERÍA SER (PBM/ESTATAL)</span>
                <b style="color: #00ff41;">$1,282.58</b>
            </div>
            <div class="card">
                <span>PAGO REAL (FEDERAL)</span>
                <b>$68.00</b>
            </div>
        </div>

        <div class="hoyo-negro">
            DIFERENCIA QUINCENAL: -$1,214.58<br>
            DESTINO: FIDEICOMISO "PLAN DE BENEFICIOS MÚLTIPLES"
        </div>

        <p style="text-align: center; margin-top: 40px;">
            <a href="../coordinacion/terminal.html" style="color: var(--p); text-decoration: none; font-size: 0.8rem;">[ VOLVER AL PANEL DE MANDO ]</a>
        </p>
    </div>

    <script>
        const ctx = document.getElementById('auditChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Monto Presupuestado x Ley', 'Monto Dispersado (Federal)'],
                datasets: [{
                    label: 'Pesos Mexicanos (Quincenal)',
                    data: [1282.58, 68.00],
                    backgroundColor: ['rgba(0, 255, 65, 0.4)', 'rgba(255, 62, 62, 0.8)'],
                    borderColor: ['#00ff41', '#ff3e3e'],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#222' },
                        ticks: { color: '#888' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#888' }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    </script>
</body>
</html>
